<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인공지능미디어코딩 — 출석 체크</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f14;
  --surface: #151921;
  --surface2: #1c2230;
  --border: #2a3142;
  --text: #e8ecf4;
  --text-dim: #7a849a;
  --accent: #4ecdc4;
  --accent-glow: rgba(78, 205, 196, 0.15);
  --present: #2ecc71;
  --present-bg: rgba(46, 204, 113, 0.1);
  --absent: #e74c3c;
  --absent-bg: rgba(231, 76, 60, 0.1);
  --late: #f39c12;
  --late-bg: rgba(243, 156, 18, 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(78, 205, 196, 0.03) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(78, 205, 196, 0.02) 0%, transparent 50%);
  z-index: -1;
}

.layout {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 16px 24px 12px;
  max-width: 1200px;
  margin: 0 auto;
}

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-shrink: 0;
}

.header-left h1 {
  font-size: 1.15rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #82e0d8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-left .date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-top: 2px;
}

.stats-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 0.75rem;
  font-family: 'JetBrains Mono', monospace;
}

.stat-chip .dot { width: 7px; height: 7px; border-radius: 50%; }
.stat-chip.total .dot { background: var(--accent); }
.stat-chip.present .dot { background: var(--present); }
.stat-chip.absent .dot { background: var(--absent); }
.stat-chip.late .dot { background: var(--late); }

.call-bar {
  display: none;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  border: 1px solid var(--accent);
  box-shadow: 0 0 30px var(--accent-glow);
  border-radius: 12px;
  padding: 12px 20px;
  margin-bottom: 12px;
  flex-shrink: 0;
  animation: fadeIn 0.3s ease;
}

.call-bar.active { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.voice-indicator { display: none; align-items: center; gap: 3px; }
.voice-indicator.active { display: flex; }

.voice-bar {
  width: 3px; height: 14px;
  background: var(--accent);
  border-radius: 2px;
  animation: voicePulse 0.6s ease-in-out infinite alternate;
}
.voice-bar:nth-child(1) { animation-delay: 0s; }
.voice-bar:nth-child(2) { animation-delay: 0.15s; }
.voice-bar:nth-child(3) { animation-delay: 0.3s; }
.voice-bar:nth-child(4) { animation-delay: 0.15s; }

@keyframes voicePulse {
  0% { height: 5px; opacity: 0.4; }
  100% { height: 18px; opacity: 1; }
}

.call-name { font-size: 1.5rem; font-weight: 900; letter-spacing: 0.02em; flex: 1; }

.call-buttons { display: flex; gap: 8px; align-items: center; }

.btn {
  border: none; border-radius: 8px; padding: 9px 22px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.btn:hover { filter: brightness(1.15); }
.btn:active { transform: scale(0.96); }
.btn-present { background: var(--present); color: #fff; }
.btn-absent { background: var(--absent); color: #fff; }
.btn-late { background: var(--late); color: #fff; }
.btn-speak { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 9px 14px; }

.kbd-hints { display: flex; gap: 14px; font-size: 0.68rem; color: var(--text-dim); margin-left: 8px; }
.kbd {
  display: inline-block; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 6px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.64rem; margin-right: 2px;
}

.grid-area { flex: 1; display: flex; flex-direction: column; min-height: 0; }

.student-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 6px;
  flex: 1;
  align-content: start;
}

.student-cell {
  display: flex; align-items: center; justify-content: center; text-align: center;
  padding: 10px 6px; border-radius: 8px; background: var(--surface);
  border: 1px solid var(--border); font-size: 0.88rem; font-weight: 500;
  cursor: default; transition: all 0.3s; position: relative; line-height: 1.3;
}

.student-cell.calling {
  border-color: var(--accent); background: var(--accent-glow);
  box-shadow: 0 0 16px var(--accent-glow);
  animation: pulse 1.2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 16px var(--accent-glow); }
  50% { box-shadow: 0 0 28px rgba(78, 205, 196, 0.25); }
}

.student-cell.present { background: var(--present-bg); border-color: rgba(46, 204, 113, 0.3); }
.student-cell.absent { background: var(--absent-bg); border-color: rgba(231, 76, 60, 0.3); }
.student-cell.late { background: var(--late-bg); border-color: rgba(243, 156, 18, 0.3); }

.student-cell .status-icon { position: absolute; top: 3px; right: 5px; font-size: 0.6rem; }

.btn-start {
  background: linear-gradient(135deg, var(--accent), #3dbeb6); color: #fff;
  padding: 7px 18px; font-size: 0.78rem; border-radius: 8px; border: none;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.btn-start:hover { filter: brightness(1.15); }
.btn-start:active { transform: scale(0.96); }
.btn-start.reverse { background: linear-gradient(135deg, #f39c12, #e67e22); }
.btn-start:disabled { opacity: 0.4; cursor: default; filter: none; }

.complete-overlay {
  position: fixed; inset: 0; background: rgba(12, 15, 20, 0.9);
  display: none; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(8px);
}
.complete-overlay.active { display: flex; }

.complete-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 36px 40px; text-align: center; max-width: 480px; width: 90%;
  max-height: 80vh; overflow-y: auto;
}
.complete-box h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
.complete-box .summary { color: var(--text-dim); margin-bottom: 24px; font-size: 0.88rem; }

.absent-item {
  padding: 9px 14px; background: var(--absent-bg); border-radius: 6px;
  margin-bottom: 4px; font-size: 0.85rem; display: flex; justify-content: space-between; text-align: left;
}
.absent-item.late-item { background: var(--late-bg); }

.tag { font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.tag-absent { background: rgba(231,76,60,0.2); color: var(--absent); }
.tag-late { background: rgba(243,156,18,0.2); color: var(--late); }

.complete-buttons { margin-top: 24px; display: flex; gap: 10px; justify-content: center; }

.btn-dl {
  background: linear-gradient(135deg, var(--accent), #3dbeb6); color: #fff;
  padding: 12px 28px; font-size: 0.9rem; border-radius: 10px; border: none;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.25s;
}
.btn-dl:hover { transform: translateY(-2px); }

.btn-reset {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 12px 28px; font-size: 0.9rem; border-radius: 10px;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.25s;
}

.all-present-msg { color: var(--present); font-weight: 600; font-size: 1rem; margin: 12px 0; }

@media (max-width: 768px) {
  .student-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 4px; }
  .student-cell { font-size: 0.78rem; padding: 8px 4px; }
  .call-name { font-size: 1.2rem; }
  .call-bar { padding: 10px 14px; gap: 10px; flex-wrap: wrap; }
  .kbd-hints { display: none; }
  .layout { padding: 10px 12px 8px; }
  .header-row { flex-direction: column; align-items: flex-start; gap: 8px; }
}
</style>
</head>
<body>

<div class="complete-overlay" id="completeOverlay">
  <div class="complete-box">
    <h2>출석 체크 완료</h2>
    <div class="summary" id="completeSummary"></div>
    <div id="absentList"></div>
    <div class="complete-buttons">
      <button class="btn-dl" onclick="downloadRecord()">📥 출결 기록 다운로드</button>
      <button class="btn-reset" onclick="resetAll()">↻ 다시 하기</button>
    </div>
  </div>
</div>

<div class="layout">
  <div class="header-row">
    <div class="header-left">
      <h1>인공지능미디어코딩</h1>
      <div class="date" id="dateDisplay"></div>
    </div>
    <div class="stats-row">
      <button class="btn-start" id="btnStart" onclick="startRollCall(false)">▶ 호명</button>
      <button class="btn-start reverse" id="btnStartRev" onclick="startRollCall(true)">◀ 역순</button>
      <div class="stat-chip total"><span class="dot"></span>전체 <strong id="statTotal">35</strong></div>
      <div class="stat-chip present"><span class="dot"></span>출석 <strong id="statPresent">0</strong></div>
      <div class="stat-chip late"><span class="dot"></span>지각 <strong id="statLate">0</strong></div>
      <div class="stat-chip absent"><span class="dot"></span>결석 <strong id="statAbsent">0</strong></div>
    </div>
  </div>

  <div class="call-bar" id="callBar">
    <div class="voice-indicator" id="voiceIndicator">
      <div class="voice-bar"></div><div class="voice-bar"></div><div class="voice-bar"></div><div class="voice-bar"></div>
    </div>
    <div class="call-name" id="callName"></div>
    <div class="call-buttons">
      <button class="btn btn-present" onclick="markStudent('present')">✓ 출석</button>
      <button class="btn btn-late" onclick="markStudent('late')">△ 지각</button>
      <button class="btn btn-absent" onclick="markStudent('absent')">✗ 결석</button>
      <button class="btn btn-speak" onclick="speakCurrent()">🔊</button>
    </div>
    <div class="kbd-hints">
      <span><span class="kbd">1</span>출석</span>
      <span><span class="kbd">2</span>지각</span>
      <span><span class="kbd">3</span>결석</span>
      <span><span class="kbd">R</span>재호명</span>
    </div>
  </div>

  <div class="grid-area">
    <div class="student-grid" id="studentGrid"></div>
  </div>
</div>

<script>
const COURSE_NAME = "인공지능미디어코딩";

const students = [
  { nameEn: "HUANG DI", nameKr: "황 디", displayName: "HUANG DI" },
  { nameEn: "LI XIAOYUAN", nameKr: "리 샤오위안", displayName: "LI XIAOYUAN" },
  { nameEn: "LIANG ZIER", nameKr: "량 즈얼", displayName: "LIANG ZIER" },
  { nameEn: "LIU YIFEI", nameKr: "류 이페이", displayName: "LIU YIFEI" },
  { nameEn: "LU YIYE", nameKr: "루 이예", displayName: "LU YIYE" },
  { nameEn: "QIAN YE", nameKr: "첸 예", displayName: "QIAN YE" },
  { nameEn: "WANG MINUO", nameKr: "왕 미누오", displayName: "WANG MINUO" },
  { nameEn: "WU TONGFEI", nameKr: "우 통페이", displayName: "WU TONGFEI" },
  { nameEn: "ZANGENEH ROUMINA", nameKr: "잔게네 루미나", displayName: "ZANGENEH ROUMINA" },
  { nameEn: "ZHANG YUHAN", nameKr: "장 위한", displayName: "ZHANG YUHAN" },
  { nameEn: "ZHOU ZIXI", nameKr: "저우 즈시", displayName: "ZHOU ZIXI" },
  { nameEn: "", nameKr: "강신재", displayName: "강신재" },
  { nameEn: "", nameKr: "강연비", displayName: "강연비" },
  { nameEn: "", nameKr: "김다연", displayName: "김다연" },
  { nameEn: "", nameKr: "김은희", displayName: "김은희" },
  { nameEn: "", nameKr: "김효준", displayName: "김효준" },
  { nameEn: "", nameKr: "남혜정", displayName: "남혜정" },
  { nameEn: "", nameKr: "라윤지", displayName: "라윤지" },
  { nameEn: "", nameKr: "박찬규", displayName: "박찬규" },
  { nameEn: "", nameKr: "서민영", displayName: "서민영" },
  { nameEn: "", nameKr: "석찬", displayName: "석찬" },
  { nameEn: "", nameKr: "송은영", displayName: "송은영" },
  { nameEn: "", nameKr: "신원석", displayName: "신원석" },
  { nameEn: "", nameKr: "이민형", displayName: "이민형" },
  { nameEn: "", nameKr: "이상원", displayName: "이상원" },
  { nameEn: "", nameKr: "이예린", displayName: "이예린" },
  { nameEn: "", nameKr: "이예은", displayName: "이예은" },
  { nameEn: "", nameKr: "이윤호", displayName: "이윤호" },
  { nameEn: "", nameKr: "장수아", displayName: "장수아" },
  { nameEn: "", nameKr: "장여진", displayName: "장여진" },
  { nameEn: "", nameKr: "조서현", displayName: "조서현" },
  { nameEn: "", nameKr: "조우림", displayName: "조우림" },
  { nameEn: "", nameKr: "최문경", displayName: "최문경" },
  { nameEn: "", nameKr: "하은채", displayName: "하은채" },
  { nameEn: "", nameKr: "한지후", displayName: "한지후" },
];

let currentIndex = -1;
let statuses = new Array(students.length).fill(null);
let isStarted = false;
let isReverse = false;
let callOrder = [];
let callPos = -1;
let koreanFemaleVoice = null;

// Date - dynamically set each time page loads
const now = new Date();
const days = ['일', '월', '화', '수', '목', '금', '토'];
const dateStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
const fileDateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
document.getElementById('dateDisplay').textContent = dateStr;

// Voice
function findKoreanVoice() {
  const voices = speechSynthesis.getVoices();
  const ko = voices.filter(v => v.lang.startsWith('ko'));
  return ko.find(v => v.name.includes('Google') && v.name.includes('한국'))
    || ko.find(v => v.name.includes('Google'))
    || ko.find(v => /female|yuna|유나|서현|heami/i.test(v.name))
    || ko[0] || null;
}

function loadVoices() { koreanFemaleVoice = findKoreanVoice(); }
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text, cb) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = 0.85;
  u.pitch = 1.1;
  if (!koreanFemaleVoice) loadVoices();
  if (koreanFemaleVoice) u.voice = koreanFemaleVoice;
  const vi = document.getElementById('voiceIndicator');
  vi.classList.add('active');
  u.onend = () => { vi.classList.remove('active'); if (cb) cb(); };
  u.onerror = () => { vi.classList.remove('active'); if (cb) cb(); };
  speechSynthesis.speak(u);
}

function speakStudent(s) {
  // Leading comma prevents TTS engine from clipping the first syllable
  speak(`, ${s.nameKr}`);
}

function renderGrid() {
  const grid = document.getElementById('studentGrid');
  grid.innerHTML = students.map((s, i) => {
    let cls = '';
    let icon = '';
    if (i === currentIndex && statuses[i] === null) cls = 'calling';
    else if (statuses[i] === 'present') { cls = 'present'; icon = '<span class="status-icon">✓</span>'; }
    else if (statuses[i] === 'absent') { cls = 'absent'; icon = '<span class="status-icon">✗</span>'; }
    else if (statuses[i] === 'late') { cls = 'late'; icon = '<span class="status-icon">△</span>'; }
    return `<div class="student-cell ${cls}" id="cell-${i}">${icon}${s.displayName}</div>`;
  }).join('');
}

function updateStats() {
  const p = statuses.filter(s => s === 'present').length;
  const a = statuses.filter(s => s === 'absent').length;
  const l = statuses.filter(s => s === 'late').length;
  document.getElementById('statPresent').textContent = p;
  document.getElementById('statAbsent').textContent = a;
  document.getElementById('statLate').textContent = l;
}

function showCurrent() {
  if (callPos >= callOrder.length) { finishRollCall(); return; }
  currentIndex = callOrder[callPos];
  const s = students[currentIndex];
  document.getElementById('callName').textContent = s.displayName;
  document.getElementById('callBar').classList.add('active');
  renderGrid();
  setTimeout(() => speakStudent(s), 300);
}

function startRollCall(reverse) {
  isStarted = true;
  isReverse = reverse;
  callOrder = students.map((_, i) => i);
  if (isReverse) callOrder.reverse();
  callPos = 0;
  currentIndex = callOrder[0];
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStartRev').disabled = true;
  speak('지금부터 출석 부르겠습니다.', () => {
    setTimeout(() => showCurrent(), 500);
  });
}

function markStudent(status) {
  if (callPos < 0 || callPos >= callOrder.length) return;
  statuses[currentIndex] = status;
  updateStats();
  callPos++;
  if (callPos < callOrder.length) showCurrent();
  else { currentIndex = -1; renderGrid(); finishRollCall(); }
}

function speakCurrent() {
  if (callPos >= 0 && callPos < callOrder.length) speakStudent(students[callOrder[callPos]]);
}

function finishRollCall() {
  document.getElementById('callBar').classList.remove('active');
  const overlay = document.getElementById('completeOverlay');
  overlay.classList.add('active');
  const p = statuses.filter(s => s === 'present').length;
  const a = statuses.filter(s => s === 'absent').length;
  const l = statuses.filter(s => s === 'late').length;
  document.getElementById('completeSummary').textContent = `출석 ${p}명 · 지각 ${l}명 · 결석 ${a}명`;

  const listEl = document.getElementById('absentList');
  const issues = students.filter((_, i) => statuses[i] === 'absent' || statuses[i] === 'late');
  if (issues.length === 0) {
    listEl.innerHTML = '<p class="all-present-msg">🎉 전원 출석!</p>';
  } else {
    listEl.innerHTML = issues.map(s => {
      const idx = students.indexOf(s);
      const st = statuses[idx];
      const tagCls = st === 'absent' ? 'tag-absent' : 'tag-late';
      const tagTxt = st === 'absent' ? '결석' : '지각';
      const itemCls = st === 'late' ? 'absent-item late-item' : 'absent-item';
      const name = s.nameEn ? `${s.displayName} (${s.nameKr})` : s.displayName;
      return `<div class="${itemCls}"><span>${name}</span><span class="tag ${tagCls}">${tagTxt}</span></div>`;
    }).join('');
  }
  speak('출석 체크가 완료되었습니다.');
}

function downloadRecord() {
  const p = statuses.filter(s => s === 'present').length;
  const a = statuses.filter(s => s === 'absent').length;
  const l = statuses.filter(s => s === 'late').length;

  let c = `과목: ${COURSE_NAME}\n`;
  c += `날짜: ${dateStr}\n`;
  c += `========================================\n\n`;
  c += `[요약]\n`;
  c += `전체: ${students.length}명 | 출석: ${p}명 | 지각: ${l}명 | 결석: ${a}명\n\n`;

  if (a > 0) {
    c += `[결석]\n`;
    students.forEach((s, i) => {
      if (statuses[i] === 'absent') {
        const name = s.nameEn ? `${s.displayName} (${s.nameKr})` : s.displayName;
        c += `  - ${name}\n`;
      }
    });
    c += `\n`;
  }
  if (l > 0) {
    c += `[지각]\n`;
    students.forEach((s, i) => {
      if (statuses[i] === 'late') {
        const name = s.nameEn ? `${s.displayName} (${s.nameKr})` : s.displayName;
        c += `  - ${name}\n`;
      }
    });
    c += `\n`;
  }

  const blob = new Blob(['\uFEFF' + c], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement('a');
  anchor.href = url;
  anchor.download = `${COURSE_NAME}_${fileDateStr}.txt`;
  anchor.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  currentIndex = -1;
  callPos = -1;
  callOrder = [];
  statuses = new Array(students.length).fill(null);
  isStarted = false;
  document.getElementById('completeOverlay').classList.remove('active');
  document.getElementById('callBar').classList.remove('active');
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStartRev').disabled = false;
  updateStats();
  renderGrid();
}

document.addEventListener('keydown', e => {
  if (!isStarted || currentIndex >= students.length) return;
  switch (e.key) {
    case '1': markStudent('present'); break;
    case '2': markStudent('late'); break;
    case '3': markStudent('absent'); break;
    case 'r': case 'R': speakCurrent(); break;
  }
});

renderGrid();
updateStats();
</script>
</body>
</html>
